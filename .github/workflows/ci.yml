name: CI - Tests

on:
  pull_request:
    branches: [ develop, main ]
  push:
    branches: [ develop ]

jobs:
  # ========== TEST BACKEND ==========
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci
          
      - name: Run linter (ESLint)
        run: npm run lint || true
        
      - name: Run unit tests
        run: npm run test || echo "Pas de tests configurés"
        
      - name: Build NestJS
        run: npm run build

  # ========== TEST FRONTEND ==========
  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci
          
      - name: Run linter
        run: npm run lint || true
        
      - name: Run tests
        run: npm run test || echo "Pas de tests configurés"
        
      - name: Build React
        run: npm run build
